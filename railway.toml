[build]
builder = "dockerfile"

[deploy]
startCommand = "python bot.py"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[ports]]
port = 8000

[[services]]
name = "bot"

[services.variables]
BOT_TOKEN = "${{ secrets.BOT_TOKEN }}"
DOWNLOAD_DIR = "/tmp/downloads"
MAX_FILE_SIZE_MB = "50"
